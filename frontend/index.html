<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutracker - Трекер питания</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍏 Nutracker</h1>
            <p id="api-status">Статус: <span class="status-text">Загрузка...</span></p>
        </header>

        <main>
            <!-- Секция: Добавление продукта -->
            <section class="card">
                <h2>Добавить продукт</h2>
                <form id="add-product-form">
                    <input type="text" id="product-name" placeholder="Название" required>
                    <input type="number" id="product-calories" placeholder="Ккал" step="0.01" required>
                    <input type="number" id="product-proteins" placeholder="Белки (г)" step="0.01" required>
                    <input type="number" id="product-carbs" placeholder="Углеводы (г)" step="0.01" required>
                    <input type="number" id="product-fats" placeholder="Жиры (г)" step="0.01" required>
                    <button type="submit">Добавить</button>
                </form>
            </section>

            <!-- Секция: Список продуктов -->
            <section class="card">
                <h2>Продукты</h2>
                <div id="products-list">Загрузка...</div>
            </section>

            <!-- Секция: Дневная сводка -->
            <section class="card">
                <h2>Сегодня</h2>
                <div id="daily-summary">
                    <p>Ккал: <strong id="today-calories">0</strong></p>
                    <p>Белки: <strong id="today-proteins">0</strong> г</p>
                    <p>Углеводы: <strong id="today-carbs">0</strong> г</p>
                    <p>Жиры: <strong id="today-fats">0</strong> г</p>
                </div>
            </section>
        </main>
    </div>

    <div>
        <h6>aye tatari</h6>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
